name: 电视直播线路自动更新

on:
  # 定时触发 - 每天北京时间早上3点（UTC时间为前一天的19点）
  schedule:
    - cron: '0 19 * * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      update_reason:
        description: '更新原因（可选）'
        required: false
        default: '手动触发更新'

jobs:
  update-tv-lines:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 运行更新脚本
        run: |
          chmod +x ./tvzy.py
          python ./tvzy.py
      
      - name: 检查是否生成了输出文件
        id: check_file
        run: |
          if [ -f ./tzydauto.txt ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
            echo "文件大小: $(du -h ./tzydauto.txt | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "频道数量: $(grep -v '^#' ./tzydauto.txt | grep ',' | wc -l)" >> $GITHUB_STEP_SUMMARY
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
            echo "::error::输出文件tzydauto.txt未生成！" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 记录直播源URL数量
          LIVE_SOURCES_COUNT=$(grep -o '"https://' ./tvzy.py | wc -l)
          echo "直播源URL数量: $LIVE_SOURCES_COUNT" >> $GITHUB_STEP_SUMMARY
      
      - name: 提交和推送更新
        if: steps.check_file.outputs.file_exists == 'true'
        run: |
          # 配置git身份和行为
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git config --global pull.rebase false  # 使用merge而不是rebase
          git config --global core.autocrlf false  # 防止行尾字符转换问题
          
          echo "=== 开始Git操作 ==="
          echo "当前分支: $(git branch --show-current)"
          
          # 直接使用origin远程仓库
          echo "同步本地与远程仓库..."
          git remote -v
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.ref_name }} || git checkout -b ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          
          echo "本地仓库已重置为远程最新状态"
          
          # 重新执行脚本确保生成最新文件
          echo "重新执行脚本生成最新文件..."
          python ./tvzy.py || {
            echo "脚本执行失败，使用现有文件继续"
          }
          
          # 检查文件是否存在
          if [ ! -f "./tzydauto.txt" ]; then
            echo "::error::错误：tzydauto.txt文件未生成"
            exit 1
          fi
          
          # 添加文件
          echo "添加更改的文件..."
          git add ./tzydauto.txt
          git add ./tvzy.log || true  # 日志文件可选
          
          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "没有检测到更改，跳过提交"
            exit 0
          fi
          
          # 获取当前日期（北京时间）
          TODAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')
          # 使用手动触发的原因或默认消息
          if [ -n "${{ github.event.inputs.update_reason }}" ]; then
            REASON="${{ github.event.inputs.update_reason }}"
          else
            REASON="自动更新 ${TODAY} 电视直播线路"
          fi
          
          # 提交更改
          echo "提交更改..."
          git commit -m "${REASON}"
          
          # 推送更改
          echo "尝试推送更改到远程仓库..."
          # 直接推送到origin
          git push origin ${{ github.ref_name }} || {
            echo "推送失败，尝试使用--force-with-lease推送..."
            git push --force-with-lease origin ${{ github.ref_name }} || {
              echo "--force-with-lease推送失败，最后尝试使用--force推送..."
              git push --force origin ${{ github.ref_name }} || {
                echo "::error::所有推送方式均失败，请检查GitHub权限配置"
                exit 1
              }
            }
          }
          
          echo "更新已提交并推送"
      
      - name: 输出成功消息
        if: steps.check_file.outputs.file_exists == 'true'
        run: |
          echo "🎉 电视直播线路更新完成！"
          echo "📁 生成的文件: tzydauto.txt"
          echo "📊 文件统计信息已记录到日志"
      
      - name: 输出失败消息
        if: steps.check_file.outputs.file_exists == 'false'
        run: |
          echo "❌ 更新失败：未生成输出文件"
          exit 1
      
      - name: 保存输出文件作为构建产物
        if: steps.check_file.outputs.file_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tv-channels-list
          path: ./tzydauto.txt
          retention-days: 7  # 保存7天
          if-no-files-found: error
